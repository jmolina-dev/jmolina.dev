<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    :root {
      --bg-color: #0f172a;
      --text-color: #14b8a6;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg-color: #f8fafc;
        --text-color: #0d9488;
      }
    }
    .bg { fill: var(--bg-color); transition: fill 0.3s; }
    .text { fill: var(--text-color); font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-weight: 900; font-size: 19px; }
  </style>
  <rect class="bg" width="32" height="32" rx="8" />
  <text class="text" x="16" y="22" text-anchor="middle">&gt;_</text>
</svg>
