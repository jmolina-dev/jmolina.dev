name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Optimize Assets and Compile CSS
        run: |
          printf "@tailwind base;\n@tailwind components;\n@tailwind utilities;\n\n" > input.css
          cat css/style.css >> input.css
          
          npx tailwindcss@3 -i input.css -o css/style.css --minify
          
          rm input.css
          
          sed -i '/cdn.tailwindcss.com/d' index.html blog/*.html
          sed -i '/js\/tailwind-config.js/d' index.html blog/*.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
