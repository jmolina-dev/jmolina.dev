name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

  # Allows manual triggering from the Actions tab
  workflow_dispatch:

# Permissions needed for deploying to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Optimize Assets and Compile CSS
        run: |
          printf "@tailwind base;\n@tailwind components;\n@tailwind utilities;\n\n" > input.css
          cat css/style.css >> input.css
          
          npx tailwindcss@3 -i input.css -o css/style.css --minify
          
          rm input.css
          
          sed -i '/cdn.tailwindcss.com/d' index.html
          sed -i '/js\/tailwind-config.js/d' index.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
